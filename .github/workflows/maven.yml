# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        java: [ 21, 25 ]
    env:
      OS: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
        cache: maven

    # jmotif-sax 2.0.1 is on master but not always on Central yet; install locally.
    - name: Install jmotif-sax from source
      run: |
        git clone --depth 1 https://github.com/jMotif/SAX.git ../SAX
        mvn -B install -P single -DskipTests -f ../SAX/pom.xml

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Upload coverage to Codecov
      if: matrix.java == 21
      uses: codecov/codecov-action@v4
      with:
        directory: ./target/site/jacoco
        files: jacoco.xml
        env_vars: OS,JAVA
        # don't fail the build if the coverage upload can't authenticate (Codecov
        # requires a token on protected branches); coverage still uploads when CODECOV_TOKEN is set
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
        name: codecov-umbrella
        verbose: true

  quality:
    name: Static analysis (PMD + SpotBugs)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
        cache: maven
    - name: Install jmotif-sax from source
      run: |
        git clone --depth 1 https://github.com/jMotif/SAX.git ../SAX
        mvn -B install -P single -DskipTests -f ../SAX/pom.xml
    - name: Run quality gate
      run: mvn -B -Pquality verify

  sonarcloud:
    # https://github.com/sonarsource/sonarcloud-github-action
    runs-on: ubuntu-latest
    # non-blocking: a missing or invalid SONAR_TOKEN must not fail the workflow
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
      with:
        # Disabling shallow clone is recommended for improving relevancy of reporting
        fetch-depth: 0
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"
        cache: maven
    - name: Install jmotif-sax from source
      run: |
        git clone --depth 1 https://github.com/jMotif/SAX.git ../SAX
        mvn -B install -P single -DskipTests -f ../SAX/pom.xml
    - name: SonarCloud Scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=jMotif_GI
